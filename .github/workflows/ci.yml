name: build-test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Izometri.CaseStudy.slnx

      - name: Build
        run: dotnet build Izometri.CaseStudy.slnx --configuration Release --no-restore

      - name: Validate compose
        run: docker compose config --quiet

      - name: Test
        run: dotnet test Izometri.CaseStudy.slnx --configuration Release --no-build
