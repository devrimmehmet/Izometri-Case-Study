name: build-test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Izometri.CaseStudy.slnx

      - name: Build
        run: dotnet build Izometri.CaseStudy.slnx --configuration Release --no-restore

      - name: Generate OpenAPI JSONs
        run: pwsh Scripts/generate-openapi.ps1 -Configuration Release

      - name: Check for OpenAPI drift
        run: |
          if [ -n "$(git status --porcelain Docs/*.json)" ]; then
            echo "Error: OpenAPI artifacts are out of date. Please run 'Scripts/generate-openapi.ps1' locally and commit the changes."
            git diff Docs/*.json
            exit 1
          fi

      - name: Validate compose
        run: docker compose config --quiet

      - name: Test
        run: dotnet test Izometri.CaseStudy.slnx --configuration Release --no-build
        env:
          VITE_COMMIT_HASH: ${{ github.sha }}
