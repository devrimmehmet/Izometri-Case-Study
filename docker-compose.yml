services:
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: izometri-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: izometri-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  expense-db:
    image: postgres:16
    container_name: izometri-expense-db
    ports:
      - "15433:5432"
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - expense_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expense_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-db:
    image: postgres:16
    container_name: izometri-notification-db
    ports:
      - "15434:5432"
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  expense-api:
    build:
      context: .
      dockerfile: src/Services/ExpenseService/ExpenseService.Api/Dockerfile
    container_name: izometri-expense-api
    depends_on:
      expense-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ExpenseDb: Host=expense-db;Port=5432;Database=expense_db;Username=postgres;Password=postgres
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      Jwt__Issuer: Izometri.CaseStudy
      Jwt__Audience: Izometri.CaseStudy
      Jwt__Secret: expense-service-development-secret-key-please-change
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-api:
    build:
      context: .
      dockerfile: src/Services/NotificationService/NotificationService.Api/Dockerfile
    container_name: izometri-notification-api
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      expense-api:
        condition: service_healthy
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__NotificationDb: Host=notification-db;Port=5432;Database=notification_db;Username=postgres;Password=postgres
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      ExpenseService__BaseUrl: http://expense-api:8080
      Jwt__Issuer: Izometri.CaseStudy
      Jwt__Audience: Izometri.CaseStudy
      Jwt__Secret: expense-service-development-secret-key-please-change
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      Smtp__Host: mail.devrimmehmet.com
      Smtp__Port: 587
      Smtp__UseSsl: "true"
      Smtp__UserName: izometricasestudy@devrimmehmet.com
      Smtp__Password: izometricasestudy@devrimmehmet.com
      Smtp__FromAddress: izometricasestudy@devrimmehmet.com
      Smtp__FromName: Izometri Expense
      Netgsm__UserCode: "8503080768"
      Netgsm__Password: "FB*7216"
      Netgsm__MsgHeader: "8503080768"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: izometri-keycloak
    profiles:
      - oauth
    command: start-dev --import-realm
    ports:
      - "18080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro

volumes:
  expense_db_data:
  notification_db_data:
