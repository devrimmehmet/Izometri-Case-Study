services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_COMMIT_HASH: ${VITE_COMMIT_HASH:-local}
    container_name: izometri-frontend
    ports:
      - "3000:80"
    depends_on:
      expense-api:
        condition: service_healthy
      notification-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health/frontend || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: izometri-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: izometri-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: izometri-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: izometri
      RABBITMQ_DEFAULT_PASS: Izometri2026!
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  expense-db:
    image: postgres:16
    container_name: izometri-expense-db
    ports:
      - "15433:5432"
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - expense_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d expense_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-db:
    image: postgres:16
    container_name: izometri-notification-db
    ports:
      - "15434:5432"
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  expense-api:
    build:
      context: .
      dockerfile: src/Services/ExpenseService/ExpenseService.Api/Dockerfile
    container_name: izometri-expense-api
    depends_on:
      expense-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      keycloak-setup:
        condition: service_completed_successfully
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__ExpenseDb: Host=expense-db;Port=5432;Database=expense_db;Username=postgres;Password=postgres
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: izometri
      RabbitMq__Password: Izometri2026!
      Jwt__Issuer: Izometri.CaseStudy
      Jwt__Audience: expense-service
      Jwt__Secret: expense-service-development-secret-key-please-change
      Jwt__Authority: http://keycloak:8080/realms/izometri
      Jwt__PublicAuthority: http://localhost:18080/realms/izometri
      Jwt__RequireHttpsMetadata: false
      Authentication__EnableLocalLogin: false
      Keycloak__Enabled: true
      Keycloak__BaseUrl: http://keycloak:8080
      Keycloak__Realm: izometri
      Keycloak__ClientId: expense-service
      Keycloak__ClientSecret: expense-service-client-secret
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  notification-api:
    build:
      context: .
      dockerfile: src/Services/NotificationService/NotificationService.Api/Dockerfile
    container_name: izometri-notification-api
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      expense-api:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__NotificationDb: Host=notification-db;Port=5432;Database=notification_db;Username=postgres;Password=postgres
      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: izometri
      RabbitMq__Password: Izometri2026!
      ExpenseService__BaseUrl: http://expense-api:8080
      Jwt__Issuer: Izometri.CaseStudy
      Jwt__Audience: expense-service
      Jwt__Secret: expense-service-development-secret-key-please-change
      Jwt__Authority: http://keycloak:8080/realms/izometri
      Jwt__PublicAuthority: http://localhost:18080/realms/izometri
      Jwt__RequireHttpsMetadata: false
      Authentication__EnableLocalLogin: false
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
      Mail__FromName: Izometri Expense
      Mail__FromEmail: no-reply@izometri.local
      Mail__Host: mailpit
      Mail__Port: 1025
      Mail__UseSsl: false
      Mail__UsePickupFolder: false
      Mail__IgnoreCertificateErrors: false
      Mail__TimeoutSeconds: 15
      Mail__UserName: ""
      Mail__Password: ""
      Mail__PickupFolderPath: App_Data/mail-drop
      Netgsm__UserCode: ""
      Netgsm__Password: ""
      Netgsm__MsgHeader: ""
      Netgsm__BaseUrl: https://api.netgsm.com.tr
      Netgsm__Encoding: TR
      Netgsm__AppName: ""
      Netgsm__UseOtpEndpoint: false
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: izometri-keycloak
    command: start-dev --import-realm --health-enabled=true
    ports:
      - "18080:8080"
      - "19000:9000"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':2328 ' /proc/net/tcp6 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  keycloak-setup:
    image: alpine:3.19
    container_name: izometri-keycloak-setup
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./deploy/keycloak:/setup:ro
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_MGMT_URL: http://keycloak:9000
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: sh -c "apk add --no-cache curl jq --quiet && sh /setup/setup-service-account-roles.sh"
    restart: on-failure:5

volumes:
  expense_db_data:
  notification_db_data:
