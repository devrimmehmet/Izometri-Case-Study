server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker-internal DNS — resolves upstream hostnames at request time, not at
    # startup. Without this, nginx fails if backend containers aren't up yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Frontend health probe (no upstream needed)
    location = /health/frontend {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ExpenseService API — proxy_pass uses a variable so nginx resolves the host
    # lazily (per request) instead of at startup.
    location /api/ {
        set $expense http://expense-api:8080;
        proxy_pass         $expense/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # NotificationService API (/notify-api/* → /api/*)
    location /notify-api/ {
        set $notif http://notification-api:8080;
        rewrite            ^/notify-api/(.*)$ /api/$1 break;
        proxy_pass         $notif;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check pass-throughs
    location = /health/expense {
        set $expense http://expense-api:8080;
        proxy_pass $expense/health;
    }

    location = /health/notification {
        set $notif http://notification-api:8080;
        proxy_pass $notif/health;
    }

    # SPA fallback — all non-asset routes serve index.html (hash router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip            on;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;
}
