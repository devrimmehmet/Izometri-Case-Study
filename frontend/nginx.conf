server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Rate limiting zone
    # limit_req_zone is defined in the http block, but alpine nginx might allow it here.
    # For this demo, security headers are the primary frontend hardening layer.

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: allow self, inline styles/scripts for Quasar/Vue, and Keycloak for OIDC.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:18080 http://localhost:5001 http://localhost:5002;" always;

    # Client body size limit (10MB for attachments/uploads)
    client_max_body_size 10M;

    # Docker-internal DNS - resolves upstream hostnames at request time, not at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Frontend health probe (no upstream needed)
    location = /health/frontend {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ExpenseService API
    location /api/ {
        set $expense http://expense-api:8080;
        proxy_pass         $expense;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # NotificationService API (/notify-api/* -> /api/*)
    location /notify-api/ {
        set $notif http://notification-api:8080;
        rewrite            ^/notify-api/(.*)$ /api/$1 break;
        proxy_pass         $notif;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Health check pass-throughs - exact match, nginx strips the location and
    # forwards only the proxy_pass URI.
    location = /health/expense {
        set $expense http://expense-api:8080;
        proxy_pass $expense/health;
    }

    location = /health/notification {
        set $notif http://notification-api:8080;
        proxy_pass $notif/health;
    }

    # SPA fallback - all non-asset routes serve index.html (hash router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip            on;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript;
}
